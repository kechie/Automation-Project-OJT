version: '3.8'

services:
  ojt-app:
    build: .
    container_name: ojt-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5000
    volumes:
      - ojt-data:/var/lib/ojt-data
    networks:
      - ojt-net

volumes:
  ojt-data:

networks:
  ojt-net:
    driver: bridge