version: '3.8'

services:
  ojt-app:
    build: .
    container_name: ojt-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
    volumes:
      - ojt-data:/var/lib/ojt-data
    networks:
      - ojt-net

volumes:
  ojt-data:

networks:
  ojt-net:
    driver: bridge